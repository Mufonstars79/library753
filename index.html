<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека — Автоинструктори Курс 753</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #f5c842;
    --accent2: #e85d3a;
    --text: #f0ede8;
    --muted: #7a7890;
    --border: #2a2a38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-inner {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .course-tag {
    display: inline-block;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); display: block; }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 400px;
    line-height: 1.6;
  }

  .drive-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0a0a0f;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 20px;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 8px;
  }

  .drive-btn:hover {
    background: #ffd94d;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,200,66,0.3);
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    font-size: 13px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .breadcrumb-item {
    cursor: pointer;
    color: var(--accent);
    transition: opacity 0.2s;
  }

  .breadcrumb-item:hover { opacity: 0.7; }
  .breadcrumb-sep { color: var(--border); }
  .breadcrumb-current { color: var(--muted); cursor: default; }

  /* Filter buttons */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px 12px 42px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--muted); }

  .filter-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 10px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,200,66,0.08);
  }

  /* Grid */
  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  /* Folder card */
  .folder-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.4s ease both;
  }

  .folder-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    background: rgba(245,200,66,0.05);
  }

  .folder-icon {
    font-size: 32px;
    flex-shrink: 0;
  }

  .folder-info { flex: 1; }

  .folder-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .folder-meta {
    font-size: 12px;
    color: var(--muted);
  }

  /* File card */
  .file-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .file-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .file-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .file-icon {
    width: 44px; height: 44px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .file-icon.pdf  { background: rgba(232,93,58,0.15); }
  .file-icon.docx { background: rgba(66,133,244,0.15); }
  .file-icon.pptx { background: rgba(251,140,0,0.15); }
  .file-icon.xlsx { background: rgba(52,168,83,0.15); }
  .file-icon.other { background: rgba(120,120,160,0.15); }

  .file-type-badge {
    font-size: 10px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .badge-pdf  { background: rgba(232,93,58,0.2); color: #e85d3a; }
  .badge-docx { background: rgba(66,133,244,0.2); color: #4285f4; }
  .badge-pptx { background: rgba(251,140,0,0.2); color: #fb8c00; }
  .badge-xlsx { background: rgba(52,168,83,0.2); color: #34a853; }
  .badge-other { background: rgba(120,120,160,0.2); color: #9090b0; }

  .file-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
    word-break: break-word;
  }

  .file-meta {
    font-size: 12px;
    color: var(--muted);
  }

  .file-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1;
    padding: 9px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }

  .action-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 500;
  }

  /* State boxes */
  .state-box {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
  }

  .back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Section title */
  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title span {
    color: var(--accent);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  footer a { color: var(--accent); text-decoration: none; }

  .error-banner {
    background: rgba(232,93,58,0.1);
    border: 1px solid rgba(232,93,58,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #e85d3a;
    display: none;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <div class="course-tag">Курс № 753</div>
        <h1>Библиотека<span>Автоинструктори</span></h1>
        <p class="subtitle">Учебни материали, документи и ресурси за курса.</p>
      </div>
      <a href="https://drive.google.com/drive/folders/1CbSAvw4hsCsamx6NsybKZ3rQ-tuTfxA1" target="_blank" class="drive-btn">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Отвори в Drive
      </a>
    </div>
  </header>

  <div class="error-banner" id="errorBanner">
    ⚠️ Грешка при зареждане. <a href="#" onclick="init()">Опитай отново</a>
  </div>

  <div id="mainView">
    <!-- Folders view -->
    <div id="foldersSection">
      <div class="section-title">📁 Папки по дати</div>
      <div class="files-grid" id="foldersGrid">
        <div class="state-box"><div class="spinner"></div><p>Зареждане…</p></div>
      </div>
    </div>

    <!-- Files view (inside folder) -->
    <div id="filesSection" style="display:none">
      <button class="back-btn" onclick="showFolders()">
        ← Назад към папките
      </button>

      <div class="section-title" id="folderTitle">📂 <span></span></div>

      <div class="controls">
        <div class="search-wrap">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="searchInput" placeholder="Търси файл..." oninput="filterFiles()">
        </div>
        <div class="filter-btns" id="filterBtns">
          <button class="filter-btn active" onclick="setFilter('all', this)">Всички</button>
          <button class="filter-btn" onclick="setFilter('pdf', this)">PDF</button>
          <button class="filter-btn" onclick="setFilter('docx', this)">Word</button>
          <button class="filter-btn" onclick="setFilter('pptx', this)">PowerPoint</button>
          <button class="filter-btn" onclick="setFilter('xlsx', this)">Excel</button>
        </div>
      </div>

      <div class="files-grid" id="filesGrid">
        <div class="state-box"><div class="spinner"></div><p>Зареждане…</p></div>
      </div>
    </div>
  </div>

  <footer>
    Библиотека Автоинструктори · Курс 753 ·
    <a href="https://drive.google.com/drive/folders/1CbSAvw4hsCsamx6NsybKZ3rQ-tuTfxA1" target="_blank">Google Drive</a>
  </footer>
</div>

<script>
  // ======= КОНФИГУРАЦИЯ =======
  const ROOT_FOLDER_ID = '1CbSAvw4hsCsamx6NsybKZ3rQ-tuTfxA1';
  const API_KEY = 'AIzaSyADiLlwS8Vvy4-n8BN9nuWbJFBuPfMBF-Y';
  // ============================

  const ICONS = { pdf:'📄', docx:'📝', doc:'📝', pptx:'📊', ppt:'📊', xlsx:'📈', xls:'📈', png:'🖼️', jpg:'🖼️', jpeg:'🖼️', mp4:'🎬', mp3:'🎵', zip:'📦' };
  const EXT_CLASS = { pdf:'pdf', docx:'docx', doc:'docx', pptx:'pptx', ppt:'pptx', xlsx:'xlsx', xls:'xlsx' };

  let allFiles = [];
  let activeFilter = 'all';

  function getExt(name) { return (name.split('.').pop() || '').toLowerCase(); }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('bg-BG', { day:'numeric', month:'short', year:'numeric' });
  }

  async function fetchDrive(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,modifiedTime,webViewLink,webContentLink)&orderBy=name&key=${API_KEY}&pageSize=200`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    return (await res.json()).files || [];
  }

  async function init() {
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('foldersGrid').innerHTML = '<div class="state-box"><div class="spinner"></div><p>Зареждане…</p></div>';

    try {
      // Load root folder contents
      const rootItems = await fetchDrive(ROOT_FOLDER_ID);
      const subFolders = rootItems.filter(f => f.mimeType === 'application/vnd.google-apps.folder');

      // If there are subfolders, load their subfolders too (1create1980 level)
      let dateFolders = [];
      if (subFolders.length > 0) {
        for (const sf of subFolders) {
          const items = await fetchDrive(sf.id);
          const df = items.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
          if (df.length > 0) {
            dateFolders = dateFolders.concat(df);
          } else {
            // The subfolder itself contains files — treat as date folder
            dateFolders.push(sf);
          }
        }
      }

      // If no nested folders, treat root items directly
      if (dateFolders.length === 0) {
        dateFolders = subFolders;
      }

      renderFolders(dateFolders);
    } catch(e) {
      document.getElementById('errorBanner').style.display = 'block';
      document.getElementById('foldersGrid').innerHTML = '<div class="state-box"><p>Грешка при зареждане.</p></div>';
    }
  }

  function renderFolders(folders) {
    const grid = document.getElementById('foldersGrid');
    if (!folders.length) {
      grid.innerHTML = '<div class="state-box"><p>Няма намерени папки.</p></div>';
      return;
    }

    grid.innerHTML = folders.map((f, i) => `
      <div class="folder-card" style="animation-delay:${i*0.05}s" onclick="openFolder('${f.id}', '${f.name.replace(/'/g,"\\'")}')">
        <div class="folder-icon">📂</div>
        <div class="folder-info">
          <div class="folder-name">${f.name}</div>
          <div class="folder-meta">Промяна: ${formatDate(f.modifiedTime)}</div>
        </div>
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    `).join('');
  }

  async function openFolder(folderId, folderName) {
    document.getElementById('foldersSection').style.display = 'none';
    document.getElementById('filesSection').style.display = 'block';
    document.querySelector('#folderTitle span').textContent = folderName;
    document.getElementById('filesGrid').innerHTML = '<div class="state-box"><div class="spinner"></div><p>Зареждане…</p></div>';
    document.getElementById('searchInput').value = '';
    activeFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.filter-btn')[0].classList.add('active');

    try {
      const items = await fetchDrive(folderId);
      allFiles = items.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');
      renderFiles(allFiles);
    } catch(e) {
      document.getElementById('filesGrid').innerHTML = '<div class="state-box"><p>Грешка при зареждане на файловете.</p></div>';
    }
  }

  function showFolders() {
    document.getElementById('filesSection').style.display = 'none';
    document.getElementById('foldersSection').style.display = 'block';
  }

  function renderFiles(files) {
    const grid = document.getElementById('filesGrid');
    if (!files.length) {
      grid.innerHTML = '<div class="state-box"><p>Няма намерени файлове.</p></div>';
      return;
    }

    grid.innerHTML = files.map((f, i) => {
      const ext  = getExt(f.name);
      const cls  = EXT_CLASS[ext] || 'other';
      const icon = ICONS[ext] || '📁';
      const dl   = f.webContentLink || `https://drive.google.com/uc?export=download&id=${f.id}`;
      const view = f.webViewLink || `https://drive.google.com/file/d/${f.id}/view`;

      return `
        <div class="file-card" style="animation-delay:${i*0.04}s">
          <div class="file-top">
            <div class="file-icon ${cls}">${icon}</div>
            <span class="file-type-badge badge-${cls}">${ext || 'файл'}</span>
          </div>
          <div class="file-name">${f.name}</div>
          <div class="file-meta">🕐 ${formatDate(f.modifiedTime)}</div>
          <div class="file-actions">
            <a href="${view}" class="action-btn" target="_blank">
              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Виж
            </a>
            <a href="${dl}" class="action-btn" target="_blank" download>
              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Свали
            </a>
          </div>
        </div>`;
    }).join('');
  }

  function filterFiles() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allFiles;
    if (activeFilter !== 'all') {
      filtered = filtered.filter(f => {
        const ext = getExt(f.name);
        if (activeFilter === 'docx') return ext === 'docx' || ext === 'doc';
        if (activeFilter === 'pptx') return ext === 'pptx' || ext === 'ppt';
        if (activeFilter === 'xlsx') return ext === 'xlsx' || ext === 'xls';
        return ext === activeFilter;
      });
    }
    if (q) filtered = filtered.filter(f => f.name.toLowerCase().includes(q));
    renderFiles(filtered);
  }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterFiles();
  }

  init();
</script>
</body>
</html>
